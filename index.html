<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title></title>
 <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #FFFFFF, #FFFFFF);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    .splash-container {
        text-align: center;
        color: white;
    }

    .logo-wrapper {
    position: relative;
    width: 140px;
    height: 140px;
    margin: 0 auto 30px;
}

    /* Anillo giratorio */
    .loader-ring {
        position: absolute;
        inset: 0;
        border: 5px solid rgba(255,255,255,0.15);
        border-top: 5px solid #D9A851;
        border-radius: 50%;
        animation: spin 1.2s linear infinite;
    }

    /* Logo */
    .logo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.logo img {
    width: 100px;
    height: 100px;
    object-fit: contain;
}

    .submessage {
        font-size: 20px;
        opacity: 0.8;
        color: black;
    }

    .dots::after {
        content: '';
        animation: dots 1.5s infinite;
        color: black;
    }

    @keyframes spin {
        from {
            transform: rotate(0deg);
        }
        to {
            transform: rotate(360deg);
        }
    }

    @keyframes dots {
        0% { content: ''; }
        25% { content: '.'; }
        50% { content: '..'; }
        75% { content: '...'; }
        100% { content: ''; }
    }
</style>
</head>
<body>
  <script>
    const AS_URL_BASE = "https://script.google.com/macros/s/AKfycbwNSD-DWP3P5yqTsk4RJP1VU5b6i1t8aFSwrtjGmJtAOGXv7EaVITYjomD_b-CneGcVhA/exec";
    
    var url = document.location.href;
    var k = url.substr(url.lastIndexOf("k=")+2);
    
    if(k){
      fetch(AS_URL_BASE+'?k='+k)
      .then(r => r.text())
      .then((r) => {
        console.log(r);
        //document.write(r);
        if(r){
          document.location.replace(r);
        }
      })
      .catch(err => console.log(err))
    }

  </script>
  
  <div class="splash-container">
    <div class="logo-wrapper">
        <div class="loader-ring"></div>
        <div class="logo">
            <img src="QR-10.png" alt="Logo">
        </div>
    </div>


    <div class="submessage">
        Redirigiendo an tu espacio <span class="dots"></span>
    </div>
</div>
  
  
</body>
</html>
